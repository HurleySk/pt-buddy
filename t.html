<uiView>
  <div id="suuntoplus">
    <!-- Title bar -->
    <div class="cm-fg" style="width:100%;height:25%">
      <div id="mode-label" class="sp-t-m p-hc" style="top:calc(60% - 50%e)">COUNT</div>
    </div>

    <!-- Bilateral L/R indicators -->
    <div id="sides" class="cm-mid sp-t-s p-hc" style="top:calc(32% - 50%e);visibility:hidden">
      <span id="side-l">-</span>
      <span> </span>
      <span id="side-r">-</span>
    </div>

    <!-- Main value (rep count or timer) -->
    <div id="main-value" class="cm-mid sp-d-l f-num p-hc" style="top:calc(50% - 50%e)">0</div>

    <!-- Sub label -->
    <div id="sub-label" class="cm-mid sp-t-s p-hc" style="top:calc(68% - 50%e)">reps</div>

    <!-- Set label -->
    <div id="set-label" class="cm-mid sp-b-m p-hc" style="top:calc(80% - 50%e)">Set 1</div>

    <!-- Button handlers -->
    <userInput>
      <pushButton name="up"
        onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 2, null, 'int32');" />
      <pushButton name="next"
        onClick="$.put('/Zapp/{zapp_index}/Event', 5, null, 'int32');" />
      <pushButton name="down"
        onClick="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');" />
    </userInput>
  </div>
</uiView>
